<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Destock Menuiserie</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
<button onclick="calculer()">Calculer le devis</button>
<button onclick="genererPDF()" style="background:#f2994a;">
function genererPDF(){
  let client = document.getElementById("client").value || "Client";
  let longueur = document.getElementById("longueur").value;
  let hauteur = document.getElementById("hauteur").value;
  let couleur = document.getElementById("couleur").value;
  let total = document.getElementById("total").innerText;
  let details = document.getElementById("details").innerHTML;

  let fenetre = window.open("", "_blank");

  fenetre.document.write(`
    <html>
    <head>
      <title>Devis Destock Menuiserie</title>
      <style>
        body{font-family:Arial;padding:30px;color:#111}
        h1{color:#476b70}
        .box{border:1px solid #ddd;border-radius:12px;padding:15px;margin:15px 0}
        .total{font-size:28px;color:#f2994a;font-weight:bold}
        .signature{margin-top:50px;border-top:1px solid #999;width:250px;padding-top:10px}
      </style>
    </head>
    <body>
      <h1>DESTOCK MENUISERIE</h1>
      <h2>DEVIS CLIENT</h2>

      <div class="box">
        <p><strong>Client :</strong> ${client}</p>
        <p><strong>Longueur :</strong> ${longueur} ml</p>
        <p><strong>Hauteur :</strong> ${hauteur} m</p>
        <p><strong>Couleur :</strong> ${couleur}</p>
      </div>

      <div class="box">
        ${details}
      </div>

      <p>Total TTC :</p>
      <div class="total">${total}</div>

      <div class="signature">
        Signature client
      </div>

      <script>
        window.print();
      <\/script>
    </body>
    </html>
  `);

  fenetre.document.close();
}
